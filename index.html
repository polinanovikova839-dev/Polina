<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Polina">
  <meta name="theme-color" content="#111111">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <title>Polina</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; width: 100%;
      background: #111;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: white;
      overflow: hidden;
    }

    /* ===== PORTRAIT FEED ===== */
    #feed {
      height: 100vh; width: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 1rem 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .block { width: 100%; cursor: pointer; }

    .carousel { width: 100%; overflow: hidden; border-radius: 20px; }

    .carousel-track {
      display: flex;
      transition: transform 0.28s ease;
      will-change: transform;
    }

    .card {
      min-width: 100%;
      border-radius: 20px;
      padding: 1.5rem;
      min-height: 140px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .card-text { font-size: 16px; font-weight: 700; line-height: 1.5; }
    .card-text.heading { font-size: 18px; letter-spacing: 0.02em; }

    .bottom-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 0.5rem;
    }

    .nav-btn {
      background: rgba(255,255,255,0.1);
      border: none; border-radius: 50%;
      width: 34px; height: 34px;
      font-size: 15px; color: white;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .nav-btn:active { background: rgba(255,255,255,0.3); }

    .dots { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; justify-content: center; }
    .dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: all 0.22s; flex-shrink: 0; }
    .dot.active { width: 14px; border-radius: 3px; background: white; }
    .progress { font-size: 10px; color: rgba(255,255,255,0.3); flex-shrink: 0; }

    /* tap hint */
    .tap-hint {
      font-size: 10px;
      color: rgba(255,255,255,0.2);
      text-align: center;
      margin-top: 0.3rem;
      letter-spacing: 0.06em;
    }

    /* ===== FULLSCREEN ===== */
    #fullscreen {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: #111;
      z-index: 100;
      flex-direction: column;
    }

    #fullscreen.active { display: flex; }

    /* top bar */
    .fs-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.8rem 1rem;
      flex-shrink: 0;
    }

    .fs-topbar-btn {
      background: rgba(255,255,255,0.1);
      border: none; border-radius: 20px;
      padding: 6px 14px;
      color: white; font-size: 13px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; gap: 5px;
      letter-spacing: 0.02em;
      transition: background 0.15s;
    }
    .fs-topbar-btn:active { background: rgba(255,255,255,0.25); }

    .fs-block-label {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      text-align: center;
      flex: 1;
    }

    /* carousel area */
    .fs-carousel {
      flex: 1;
      overflow: hidden;
      margin: 0 0.5rem;
    }

    .fs-track {
      display: flex;
      height: 100%;
      transition: transform 0.28s ease;
      will-change: transform;
    }

    .fs-card {
      min-width: 100%; height: 100%;
      border-radius: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem 2.5rem;
    }

    .fs-text { font-size: 22px; font-weight: 700; line-height: 1.5; }
    .fs-text.heading { font-size: 26px; letter-spacing: 0.02em; }

    /* bottom bar */
    .fs-bottombar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 0.8rem 1rem;
      flex-shrink: 0;
    }

    .fs-dots { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; justify-content: center; max-width: 200px; }
    .fs-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: all 0.22s; }
    .fs-dot.active { width: 18px; border-radius: 3px; background: white; }
    .fs-progress { font-size: 11px; color: rgba(255,255,255,0.35); }
  </style>
</head>
<body>

<!-- PORTRAIT FEED -->
<div id="feed"></div>

<!-- FULLSCREEN -->
<div id="fullscreen">
  <div class="fs-topbar">
    <button class="fs-topbar-btn" onclick="exitFullscreen()">← Back</button>
    <div class="fs-block-label" id="fs-label"></div>
    <button class="fs-topbar-btn" onclick="fsNextBlock()">Next →</button>
  </div>

  <div class="fs-carousel">
    <div class="fs-track" id="fs-track"></div>
  </div>

  <div class="fs-bottombar">
    <button class="nav-btn" onclick="fsSlide(-1)">←</button>
    <div class="fs-dots" id="fs-dots"></div>
    <span class="fs-progress" id="fs-prog"></span>
    <button class="nav-btn" onclick="fsSlide(1)">→</button>
  </div>
</div>

<script>
const data = [
  {
    label: "LP 1 — Customer Obsession",
    cards: [
      { bg: "#FF6B6B", color: "#fff", heading: true, text: "CUSTOMER OBSESSION" },
      { bg: "#FF6B6B", color: "#fff", text: "Leaders start with the customer and work backwards." },
      { bg: "#FF8E53", color: "#fff", text: "They work vigorously to earn and keep customer trust." },
      { bg: "#FFCC00", color: "#1a1a1a", text: "Although leaders pay attention to competitors, they obsess over customers." },
      { bg: "#FF6B6B", color: "#fff", text: "For GREF: your customer is the Amazon employee. Start with what they need to know, feel, and do — not what's convenient to communicate." }
    ]
  },
  {
    label: "LP 2 — Ownership",
    cards: [
      { bg: "#FF2D55", color: "#fff", heading: true, text: "OWNERSHIP" },
      { bg: "#FF2D55", color: "#fff", text: "Leaders are owners. They think long term and don't sacrifice long-term value for short-term results." },
      { bg: "#FF6B6B", color: "#fff", text: "They act on behalf of the entire company, beyond just their own team." },
      { bg: "#FF8E53", color: "#fff", text: "They never say 'that's not my job'." },
      { bg: "#FFCC00", color: "#1a1a1a", text: "If you see a problem — you own it. Even if it belongs to another team." }
    ]
  },
  {
    label: "LP 3 — Invent and Simplify",
    cards: [
      { bg: "#AF52DE", color: "#fff", heading: true, text: "INVENT AND SIMPLIFY" },
      { bg: "#AF52DE", color: "#fff", text: "Leaders expect and require innovation and invention from their teams and always find ways to simplify." },
      { bg: "#5856D6", color: "#fff", text: "They are externally aware, look for new ideas from everywhere, and are not limited by 'not invented here'." },
      { bg: "#007AFF", color: "#fff", text: "As we do new things, we accept that we may be misunderstood for long periods of time." },
      { bg: "#AF52DE", color: "#fff", text: "New format, new channel, simpler message — always ask: how can we make this better AND simpler?" }
    ]
  },
  {
    label: "LP 4 — Are Right, A Lot",
    cards: [
      { bg: "#5AC8FA", color: "#1a1a1a", heading: true, text: "ARE RIGHT, A LOT" },
      { bg: "#5AC8FA", color: "#1a1a1a", text: "Leaders are right a lot. They have strong judgment and good instincts." },
      { bg: "#007AFF", color: "#fff", text: "They seek diverse perspectives and work to disconfirm their beliefs." },
      { bg: "#5856D6", color: "#fff", text: "Being right doesn't mean being stubborn — it means being willing to update based on new data." },
      { bg: "#5AC8FA", color: "#1a1a1a", text: "In comms: back your decisions with data, but stay open to changing direction when the audience responds differently than expected." }
    ]
  },
  {
    label: "LP 5 — Learn and Be Curious",
    cards: [
      { bg: "#4CD964", color: "#fff", heading: true, text: "LEARN AND BE CURIOUS" },
      { bg: "#4CD964", color: "#fff", text: "Leaders are never done learning and always seek to improve themselves." },
      { bg: "#FF8E53", color: "#fff", text: "They are curious about new possibilities and act to explore them." },
      { bg: "#FFCC00", color: "#1a1a1a", text: "In your role: stay on top of internal comms trends, new tools, what other companies are doing better." },
      { bg: "#4CD964", color: "#fff", text: "Curiosity is not a soft skill at Amazon — it's a performance expectation." }
    ]
  },
  {
    label: "LP 6 — Hire and Develop the Best",
    cards: [
      { bg: "#FF8E53", color: "#fff", heading: true, text: "HIRE AND DEVELOP THE BEST" },
      { bg: "#FF8E53", color: "#fff", text: "Leaders raise the performance bar with every hire and promotion." },
      { bg: "#FF2D55", color: "#fff", text: "They recognize exceptional talent and willingly move them throughout the organization." },
      { bg: "#FFCC00", color: "#1a1a1a", text: "They develop leaders and take their role in coaching others seriously." },
      { bg: "#FF8E53", color: "#fff", text: "Even as an IC: mentor junior colleagues, give honest feedback, raise the bar around you." }
    ]
  },
  {
    label: "LP 7 — Insist on the Highest Standards",
    cards: [
      { bg: "#FFCC00", color: "#1a1a1a", heading: true, text: "INSIST ON THE HIGHEST STANDARDS" },
      { bg: "#FFCC00", color: "#1a1a1a", text: "Leaders have relentlessly high standards — many people may think these standards are unreasonably high." },
      { bg: "#FF8E53", color: "#fff", text: "Leaders are continually raising the bar and driving their teams to deliver high-quality products, services, and processes." },
      { bg: "#FF6B6B", color: "#fff", text: "'Good enough' is not a finish line. If the copy is almost right — it's not right." },
      { bg: "#FFCC00", color: "#1a1a1a", text: "For GREF comms: every message that goes to 10,000 employees reflects the standard you set." }
    ]
  },
  {
    label: "LP 8 — Think Big",
    cards: [
      { bg: "#007AFF", color: "#fff", heading: true, text: "THINK BIG" },
      { bg: "#007AFF", color: "#fff", text: "Thinking small is a self-fulfilling prophecy." },
      { bg: "#5856D6", color: "#fff", text: "Leaders create and communicate a bold direction that inspires results." },
      { bg: "#AF52DE", color: "#fff", text: "They think differently and look around corners for ways to serve customers." },
      { bg: "#007AFF", color: "#fff", text: "Don't plan a newsletter. Plan a communication system that scales across 60 countries." }
    ]
  },
  {
    label: "LP 9 — Bias for Action",
    cards: [
      { bg: "#FF2D55", color: "#fff", heading: true, text: "BIAS FOR ACTION" },
      { bg: "#FF2D55", color: "#fff", text: "Speed matters in business." },
      { bg: "#FF6B6B", color: "#fff", text: "Many decisions and actions are reversible and do not need extensive study." },
      { bg: "#FF8E53", color: "#fff", text: "We value calculated risk taking." },
      { bg: "#FF2D55", color: "#fff", text: "A good plan executed fast beats a perfect plan executed never. Move, then adjust." }
    ]
  },
  {
    label: "LP 10 — Frugality",
    cards: [
      { bg: "#5856D6", color: "#fff", heading: true, text: "FRUGALITY" },
      { bg: "#5856D6", color: "#fff", text: "Accomplish more with less." },
      { bg: "#AF52DE", color: "#fff", text: "Constraints breed resourcefulness, self-sufficiency, and invention." },
      { bg: "#007AFF", color: "#fff", text: "There are no extra points for growing headcount, budget size, or fixed expense." },
      { bg: "#5856D6", color: "#fff", text: "Before asking for more budget — ask what you can do with what you have. Then do that first." }
    ]
  },
  {
    label: "LP 11 — Earn Trust",
    cards: [
      { bg: "#4CD964", color: "#fff", heading: true, text: "EARN TRUST" },
      { bg: "#4CD964", color: "#fff", text: "Leaders listen attentively, speak candidly, and treat others respectfully." },
      { bg: "#5AC8FA", color: "#1a1a1a", text: "They are vocally self-critical, even when it's embarrassing or awkward." },
      { bg: "#007AFF", color: "#fff", text: "Leaders do not believe their or their team's body odor smells of perfume." },
      { bg: "#4CD964", color: "#fff", text: "Say what you mean. Admit when you were wrong. Disagree openly — not passively." }
    ]
  },
  {
    label: "LP 12 — Dive Deep",
    cards: [
      { bg: "#FF8E53", color: "#fff", heading: true, text: "DIVE DEEP" },
      { bg: "#FF8E53", color: "#fff", text: "Leaders operate at all levels, stay connected to the details, audit frequently." },
      { bg: "#FFCC00", color: "#1a1a1a", text: "No task is beneath them." },
      { bg: "#FF6B6B", color: "#fff", text: "When data and anecdote differ, they are sceptical and insist on understanding both." },
      { bg: "#FF8E53", color: "#fff", text: "Know your open rates, your click-throughs, your employee sentiment. Don't manage from a distance." }
    ]
  },
  {
    label: "LP 13 — Have Backbone; Disagree and Commit",
    cards: [
      { bg: "#5AC8FA", color: "#1a1a1a", heading: true, text: "HAVE BACKBONE; DISAGREE AND COMMIT" },
      { bg: "#5AC8FA", color: "#1a1a1a", text: "Leaders are obligated to respectfully challenge decisions when they disagree, even when doing so is uncomfortable or exhausting." },
      { bg: "#007AFF", color: "#fff", text: "Leaders have conviction and are tenacious." },
      { bg: "#5856D6", color: "#fff", text: "Once a decision is determined, they commit wholly." },
      { bg: "#5AC8FA", color: "#1a1a1a", text: "Push back before the decision. After the decision — full commitment, no silent sabotage." }
    ]
  },
  {
    label: "LP 14 — Deliver Results",
    cards: [
      { bg: "#FF6B6B", color: "#fff", heading: true, text: "DELIVER RESULTS" },
      { bg: "#FF6B6B", color: "#fff", text: "Leaders focus on the key inputs for their business and deliver them with the right quality and in a timely fashion." },
      { bg: "#FF8E53", color: "#fff", text: "Despite setbacks, they rise to the occasion and never settle." },
      { bg: "#FFCC00", color: "#1a1a1a", text: "Effort is not a result. Output is not outcome. Measure what actually changed." },
      { bg: "#FF6B6B", color: "#fff", text: "Always have the number ready: open rate, attendance, response time, NPS. Results talk." }
    ]
  },
  {
    label: "LP 15 — Strive to be Earth's Best Employer",
    cards: [
      { bg: "#AF52DE", color: "#fff", heading: true, text: "STRIVE TO BE EARTH'S BEST EMPLOYER" },
      { bg: "#AF52DE", color: "#fff", text: "Leaders work every day to create a safer, more productive, higher performing, more diverse, and more just work environment." },
      { bg: "#5856D6", color: "#fff", text: "They lead with empathy, have fun at work, and make it easy for others to have fun." },
      { bg: "#007AFF", color: "#fff", text: "Leaders ask themselves: are the people I lead growing? Do they have what they need to succeed?" },
      { bg: "#AF52DE", color: "#fff", text: "For GREF: you communicate the physical workplace. Make employees feel seen, supported, and valued — every message." }
    ]
  },
  {
    label: "LP 16 — Success and Scale Bring Broad Responsibility",
    cards: [
      { bg: "#FFCC00", color: "#1a1a1a", heading: true, text: "SUCCESS AND SCALE BRING BROAD RESPONSIBILITY" },
      { bg: "#FFCC00", color: "#1a1a1a", text: "Amazon is a large company that starts with a significant impact on the world." },
      { bg: "#4CD964", color: "#fff", text: "We must be humble and thoughtful about the secondary effects of our actions." },
      { bg: "#FF8E53", color: "#fff", text: "We must act in ways that make the broader world a better place." },
      { bg: "#FFCC00", color: "#1a1a1a", text: "Think beyond the campaign. Every communication shapes culture — inside Amazon and beyond." }
    ]
  }
];

const pState = data.map(() => 0);
let fsBlock = 0;
let fsCard = 0;
let isFullscreen = false;

// ===== BUILD PORTRAIT =====
function buildPortrait() {
  const feed = document.getElementById('feed');
  data.forEach((block, bi) => {
    const el = document.createElement('div');
    el.className = 'block';
    el.id = `block-${bi}`;
    el.innerHTML = `
      <div class="carousel" id="carousel-${bi}">
        <div class="carousel-track" id="track-${bi}">
          ${block.cards.map(c =>
            `<div class="card" style="background:${c.bg};color:${c.color}">
              <div class="card-text${c.heading?' heading':''}">${c.text}</div>
            </div>`).join('')}
        </div>
      </div>
      <div class="bottom-row">
        <button class="nav-btn" onclick="pSlide(${bi},-1);event.stopPropagation()">←</button>
        <div class="dots" id="pdots-${bi}"></div>
        <span class="progress" id="pprog-${bi}"></span>
        <button class="nav-btn" onclick="pSlide(${bi},1);event.stopPropagation()">→</button>
      </div>
      <div class="tap-hint">tap to expand</div>
    `;
    el.querySelector('.carousel').addEventListener('click', () => openFullscreen(bi));
    feed.appendChild(el);
    pUpdateDots(bi);
  });
}

function pSlide(bi, dir) {
  pState[bi] = (pState[bi] + dir + data[bi].cards.length) % data[bi].cards.length;
  document.getElementById(`track-${bi}`).style.transform = `translateX(-${pState[bi]*100}%)`;
  pUpdateDots(bi);
}

function pUpdateDots(bi) {
  document.getElementById(`pdots-${bi}`).innerHTML =
    data[bi].cards.map((_,i) => `<div class="dot ${i===pState[bi]?'active':''}"></div>`).join('');
  document.getElementById(`pprog-${bi}`).textContent = `${pState[bi]+1}/${data[bi].cards.length}`;
}

// ===== FULLSCREEN =====
function openFullscreen(bi) {
  fsBlock = bi;
  fsCard = pState[bi];
  renderFsCards();
  document.getElementById('fullscreen').classList.add('active');
  document.getElementById('feed').style.display = 'none';
  isFullscreen = true;
}

function exitFullscreen() {
  pState[fsBlock] = fsCard;
  document.getElementById(`track-${fsBlock}`).style.transform = `translateX(-${fsCard*100}%)`;
  pUpdateDots(fsBlock);

  document.getElementById('fullscreen').classList.remove('active');
  document.getElementById('feed').style.display = 'flex';
  isFullscreen = false;

  setTimeout(() => {
    const blockEl = document.getElementById(`block-${fsBlock}`);
    if (blockEl) blockEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 100);
}

function fsNextBlock() {
  fsBlock = (fsBlock + 1) % data.length;
  fsCard = 0;
  renderFsCards();
}

function fsPrevBlock() {
  fsBlock = (fsBlock - 1 + data.length) % data.length;
  fsCard = 0;
  renderFsCards();
}

function renderFsCards() {
  const track = document.getElementById('fs-track');
  const block = data[fsBlock];
  track.innerHTML = block.cards.map(c =>
    `<div class="fs-card" style="background:${c.bg};color:${c.color}">
      <div class="fs-text${c.heading?' heading':''}">${c.text}</div>
    </div>`).join('');
  track.style.transition = 'none';
  track.style.transform = `translateX(-${fsCard*100}%)`;
  setTimeout(() => track.style.transition = 'transform 0.28s ease', 10);
  document.getElementById('fs-label').textContent = block.label;
  fsUpdateDots();
}

function fsSlide(dir) {
  fsCard = (fsCard + dir + data[fsBlock].cards.length) % data[fsBlock].cards.length;
  document.getElementById('fs-track').style.transform = `translateX(-${fsCard*100}%)`;
  fsUpdateDots();
}

function fsUpdateDots() {
  document.getElementById('fs-dots').innerHTML =
    data[fsBlock].cards.map((_,i) => `<div class="fs-dot ${i===fsCard?'active':''}"></div>`).join('');
  document.getElementById('fs-prog').textContent = `${fsCard+1}/${data[fsBlock].cards.length}`;
}

// ===== TOUCH SWIPE =====
let tx = 0, ty = 0, touchBi = null;

document.addEventListener('touchstart', e => {
  tx = e.touches[0].clientX;
  ty = e.touches[0].clientY;
  if (!isFullscreen) {
    let el = e.target;
    while (el && !el.classList.contains('block')) el = el.parentElement;
    touchBi = el ? parseInt(el.id.split('-')[1]) : null;
  }
}, { passive: true });

document.addEventListener('touchend', e => {
  const dx = tx - e.changedTouches[0].clientX;
  const dy = e.changedTouches[0].clientY - ty;
  const adx = Math.abs(dx);
  const ady = Math.abs(dy);

  if (isFullscreen) {
    if (dy > 80 && ady > adx) { exitFullscreen(); return; }
    if (adx > 40 && adx > ady) { dx > 0 ? fsSlide(1) : fsSlide(-1); }
  } else {
    if (adx > 40 && adx > ady && touchBi !== null) {
      dx > 0 ? pSlide(touchBi, 1) : pSlide(touchBi, -1);
    }
  }
});

// ===== KEYBOARD =====
document.addEventListener('keydown', e => {
  if (isFullscreen) {
    if (e.key === 'ArrowRight') fsSlide(1);
    if (e.key === 'ArrowLeft') fsSlide(-1);
    if (e.key === 'Escape') exitFullscreen();
  }
});

// ===== INIT =====
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});
buildPortrait();
</script>
</body>
</html>
