<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Polina">
  <meta name="theme-color" content="#111111">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <title>Polina</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; width: 100%;
      background: #111;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: white;
      overflow: hidden;
    }

    /* ===== PORTRAIT FEED ===== */
    #feed {
      height: 100vh; width: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 1rem 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .block { width: 100%; cursor: pointer; }

    .carousel { width: 100%; overflow: hidden; border-radius: 20px; }

    .carousel-track {
      display: flex;
      transition: transform 0.28s ease;
      will-change: transform;
    }

    .card {
      min-width: 100%;
      border-radius: 20px;
      padding: 1.5rem;
      min-height: 140px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .card-text { font-size: 16px; font-weight: 700; line-height: 1.5; }
    .card-text.heading { font-size: 18px; letter-spacing: 0.02em; }

    .bottom-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 0.5rem;
    }

    .nav-btn {
      background: rgba(255,255,255,0.1);
      border: none; border-radius: 50%;
      width: 34px; height: 34px;
      font-size: 15px; color: white;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .nav-btn:active { background: rgba(255,255,255,0.3); }

    .dots { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; justify-content: center; }
    .dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: all 0.22s; flex-shrink: 0; }
    .dot.active { width: 14px; border-radius: 3px; background: white; }
    .progress { font-size: 10px; color: rgba(255,255,255,0.3); flex-shrink: 0; }

    /* tap hint */
    .tap-hint {
      font-size: 10px;
      color: rgba(255,255,255,0.2);
      text-align: center;
      margin-top: 0.3rem;
      letter-spacing: 0.06em;
    }

    /* ===== FULLSCREEN ===== */
    #fullscreen {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: #111;
      z-index: 100;
      flex-direction: column;
    }

    #fullscreen.active { display: flex; }

    /* top bar */
    .fs-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.8rem 1rem;
      flex-shrink: 0;
    }

    .fs-topbar-btn {
      background: rgba(255,255,255,0.1);
      border: none; border-radius: 20px;
      padding: 6px 14px;
      color: white; font-size: 13px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; gap: 5px;
      letter-spacing: 0.02em;
      transition: background 0.15s;
    }
    .fs-topbar-btn:active { background: rgba(255,255,255,0.25); }

    .fs-block-label {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      text-align: center;
      flex: 1;
    }

    /* carousel area */
    .fs-carousel {
      flex: 1;
      overflow: hidden;
      margin: 0 0.5rem;
    }

    .fs-track {
      display: flex;
      height: 100%;
      transition: transform 0.28s ease;
      will-change: transform;
    }

    .fs-card {
      min-width: 100%; height: 100%;
      border-radius: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem 2.5rem;
    }

    .fs-text { font-size: 22px; font-weight: 700; line-height: 1.5; }
    .fs-text.heading { font-size: 26px; letter-spacing: 0.02em; }

    /* bottom bar */
    .fs-bottombar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 0.8rem 1rem;
      flex-shrink: 0;
    }

    .fs-dots { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; justify-content: center; max-width: 200px; }
    .fs-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: all 0.22s; }
    .fs-dot.active { width: 18px; border-radius: 3px; background: white; }
    .fs-progress { font-size: 11px; color: rgba(255,255,255,0.35); }
  </style>
</head>
<body>

<!-- PORTRAIT FEED -->
<div id="feed"></div>

<!-- FULLSCREEN -->
<div id="fullscreen">
  <div class="fs-topbar">
    <button class="fs-topbar-btn" onclick="exitFullscreen()">← Back</button>
    <div class="fs-block-label" id="fs-label"></div>
    <button class="fs-topbar-btn" onclick="fsNextBlock()">Next →</button>
  </div>

  <div class="fs-carousel">
    <div class="fs-track" id="fs-track"></div>
  </div>

  <div class="fs-bottombar">
    <button class="nav-btn" onclick="fsSlide(-1)">←</button>
    <div class="fs-dots" id="fs-dots"></div>
    <span class="fs-progress" id="fs-prog"></span>
    <button class="nav-btn" onclick="fsSlide(1)">→</button>
  </div>
</div>

<script>
const data = [
  {
    label: "Tell Me About Yourself",
    cards: [
      { bg: "#FF6B6B", color: "#fff", heading: true, text: "TELL ME ABOUT YOURSELF" },
      { bg: "#FF6B6B", color: "#fff", text: "I'm a communications and operations specialist with 15 years of experience." },
      { bg: "#FF8E53", color: "#fff", text: "My superpower is problem solving — I come into a situation where something isn't working, audit the root cause, and build processes that deliver measurable results." },
      { bg: "#FFCC00", color: "#1a1a1a", text: "At Hearst, Hubert Burda Media and InMyRoom the websites weren't growing — I restructured the editorial workflow and achieved 30–35% traffic growth year on year." },
      { bg: "#4CD964", color: "#fff", text: "At Merck employees weren't opening emails — I put up posters with QR codes and got 10,000 townhall views." },
      { bg: "#5AC8FA", color: "#fff", text: "At Habyt residents were leaving negative reviews — I fixed the communication and operations and reduced negative feedback by 20%." },
      { bg: "#007AFF", color: "#fff", text: "What gives me energy is working with real people and seeing results I can actually measure." },
      { bg: "#5856D6", color: "#fff", text: "That's why this role interests me — because the impact is measurable and the challenges are real." }
    ]
  },
{
    label: "Tell Me About Your Experience",
    cards: [
      { bg: "#FF2D55", color: "#fff", heading: true, text: "TELL ME ABOUT YOUR EXPERIENCE" },
      { bg: "#FF2D55", color: "#fff", text: "My career has three chapters that connect directly to what this role needs. The first — editorial. I know how to write headlines that grab attention and drive action." },
      { bg: "#FF6B6B", color: "#fff", text: "I create storytelling that people remember, and visuals that they associate with a strong brand. I combine it with strong social media management experience." },
      { bg: "#FF8E53", color: "#fff", text: "At ELLE Girl I grew the website audience to 3.5 million readers and at InMyRoom to 6 million — through daily publishing, data-driven editorial strategy, social media distribution, agile content workflows, and leading creative teams from brief to delivery." },
      { bg: "#FFCC00", color: "#1a1a1a", text: "The second chapter — communications. At Merck I owned internal communications for 65,000 employees. At European Olympic Academies I built B2B social media strategy around executive thought leadership." },
      { bg: "#4CD964", color: "#fff", text: "At PackPart I developed the concept and scripts for a short executive video series. I have hands-on video production skills and experience managing freelancers." },
      { bg: "#5AC8FA", color: "#fff", text: "At advertising agency Elbe am Rhein I managed B2B client accounts on LinkedIn and doubled the agency's LinkedIn audience through organic content." },
      { bg: "#007AFF", color: "#fff", text: "The third chapter — operations. At Habyt I managed 500+ units across three German cities — a full southern Germany region. Every day I handled hundreds of tickets from frustrated tenants — crisis situations, escalations, direct response." },
      { bg: "#5856D6", color: "#fff", text: "I coordinated multiple teams and used every communication tool available to resolve problems fast and show that the brand kept its promises. The result was a measurable reduction in negative reviews." },
      { bg: "#AF52DE", color: "#fff", text: "For Kyriba I would start by immersing myself in the B2B strategy and the audience. Then build the editorial strategy, content calendar, handle production, writing and quality control, publish, present performance insights to stakeholders, and use the data to scale what works and bring new initiatives to the table." }
    ]
  },
  {
    label: "Strengths & Results",
    cards: [
      { bg: "#5856D6", color: "#fff", heading: true, text: "WHAT ARE YOUR STRENGTHS AND RESULTS?" },
      { bg: "#5856D6", color: "#fff", text: "My strongest skill is taking business objectives and solving them through communication — and delivering measurable results." },
      { bg: "#AF52DE", color: "#fff", text: "I see where communication breaks down and build the mechanics that make it work — directly tied to business goals." },
      { bg: "#FF2D55", color: "#fff", text: "At Merck the symptom was low townhall attendance. The root cause was that employees didn't see the email because they weren't at their desks." },
      { bg: "#FF6B6B", color: "#fff", text: "So I went where they were — the canteen — with posters and QR codes. The result was 10,000 views." },
      { bg: "#FF8E53", color: "#fff", text: "At Habyt the symptom was negative reviews. The root cause was a broken chain between the resident and the teams who could actually solve the problem." },
      { bg: "#FFCC00", color: "#1a1a1a", text: "I became the bridge that never broke — building operational processes that connected residents to solutions." },
      { bg: "#4CD964", color: "#fff", text: "As a result, response time dropped by 35% and negative feedback by 20%. Not bad for someone who just moved to Germany." },
      { bg: "#5AC8FA", color: "#fff", text: "I build the channel strategy and governance framework so the same problem doesn't come back." }
    ]
  },
  {
    label: "What Excites You",
    cards: [
      { bg: "#007AFF", color: "#fff", heading: true, text: "WHAT EXCITES YOU ABOUT THIS ROLE?" },
      { bg: "#007AFF", color: "#fff", text: "Right now I'm completing the McKinsey Forward Programme and looking for a senior role where communication has a direct business impact." },
      { bg: "#5856D6", color: "#fff", text: "I've spent 15 years building content systems, communications frameworks, and operational processes across very different industries." },
      { bg: "#AF52DE", color: "#fff", text: "What I'm most proud of is building community at B2B level — at creative agency Elbe am Rhein and among stakeholders of the European Olympic Academies across 30 countries." },
      { bg: "#FF2D55", color: "#fff", text: "At EOA I built a communications strategy around executive thought leadership that felt human, not corporate." },
      { bg: "#FF8E53", color: "#fff", text: "At PackPart I took the same approach into short executive thought leadership videos — and applied my hands-on skills in AI design and video editing." },
      { bg: "#FFCC00", color: "#1a1a1a", text: "I want to bring these skills to a company at Kyriba's level — and feed my passion for finance and grow in the world of financial instruments." }
    ]
  },
  {
    label: "Why Kyriba",
    cards: [
      { bg: "#4CD964", color: "#fff", heading: true, text: "WHY KYRIBA?" },
      { bg: "#4CD964", color: "#fff", text: "Three reasons. First — the audience. Financial Officers care about three things every single day: control, visibility, and risk." },
      { bg: "#5AC8FA", color: "#fff", text: "Not as abstract concepts — as real daily pressure. My job at Kyriba is to translate complex treasury solutions into content that speaks directly to that pressure." },
      { bg: "#007AFF", color: "#fff", text: "Second — the scale. 3,000 customers, 15 trillion dollars in payments, 30+ markets. Building a LinkedIn thought leadership programme at this scale is a different kind of problem than I've solved before. I want that challenge." },
      { bg: "#5856D6", color: "#fff", text: "Third — the mechanics. Kyriba connects, protects, forecasts and optimises. Every one of those four words is a story." },
      { bg: "#AF52DE", color: "#fff", text: "My job is to find the human version — the CFO who saved 8 hours a week, the treasury team that caught a fraud attempt at 2am, the company that survived a currency crisis because they had visibility." },
      { bg: "#FF2D55", color: "#fff", text: "Those stories exist. I want to find them and tell them." }
    ]
  }
];

const pState = data.map(() => 0);
let fsBlock = 0;
let fsCard = 0;
let isFullscreen = false;

// ===== BUILD PORTRAIT =====
function buildPortrait() {
  const feed = document.getElementById('feed');
  data.forEach((block, bi) => {
    const el = document.createElement('div');
    el.className = 'block';
    el.id = `block-${bi}`;
    el.innerHTML = `
      <div class="carousel" id="carousel-${bi}">
        <div class="carousel-track" id="track-${bi}">
          ${block.cards.map(c =>
            `<div class="card" style="background:${c.bg};color:${c.color}">
              <div class="card-text${c.heading?' heading':''}">${c.text}</div>
            </div>`).join('')}
        </div>
      </div>
      <div class="bottom-row">
        <button class="nav-btn" onclick="pSlide(${bi},-1);event.stopPropagation()">←</button>
        <div class="dots" id="pdots-${bi}"></div>
        <span class="progress" id="pprog-${bi}"></span>
        <button class="nav-btn" onclick="pSlide(${bi},1);event.stopPropagation()">→</button>
      </div>
      <div class="tap-hint">tap to expand</div>
    `;
    // Tap card to open fullscreen
    el.querySelector('.carousel').addEventListener('click', () => openFullscreen(bi));
    feed.appendChild(el);
    pUpdateDots(bi);
  });
}

function pSlide(bi, dir) {
  pState[bi] = (pState[bi] + dir + data[bi].cards.length) % data[bi].cards.length;
  document.getElementById(`track-${bi}`).style.transform = `translateX(-${pState[bi]*100}%)`;
  pUpdateDots(bi);
}

function pUpdateDots(bi) {
  document.getElementById(`pdots-${bi}`).innerHTML =
    data[bi].cards.map((_,i) => `<div class="dot ${i===pState[bi]?'active':''}"></div>`).join('');
  document.getElementById(`pprog-${bi}`).textContent = `${pState[bi]+1}/${data[bi].cards.length}`;
}

// ===== FULLSCREEN =====
function openFullscreen(bi) {
  fsBlock = bi;
  fsCard = pState[bi];
  renderFsCards();
  document.getElementById('fullscreen').classList.add('active');
  document.getElementById('feed').style.display = 'none';
  isFullscreen = true;
}

function exitFullscreen() {
  // Sync card state back to portrait
  pState[fsBlock] = fsCard;
  document.getElementById(`track-${fsBlock}`).style.transform = `translateX(-${fsCard*100}%)`;
  pUpdateDots(fsBlock);

  document.getElementById('fullscreen').classList.remove('active');
  document.getElementById('feed').style.display = 'flex';
  isFullscreen = false;

  // Scroll to source block
  setTimeout(() => {
    const blockEl = document.getElementById(`block-${fsBlock}`);
    if (blockEl) blockEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 100);
}

function fsNextBlock() {
  fsBlock = (fsBlock + 1) % data.length;
  fsCard = 0;
  renderFsCards();
}

function fsPrevBlock() {
  fsBlock = (fsBlock - 1 + data.length) % data.length;
  fsCard = 0;
  renderFsCards();
}

function renderFsCards() {
  const track = document.getElementById('fs-track');
  const block = data[fsBlock];
  track.innerHTML = block.cards.map(c =>
    `<div class="fs-card" style="background:${c.bg};color:${c.color}">
      <div class="fs-text${c.heading?' heading':''}">${c.text}</div>
    </div>`).join('');
  track.style.transition = 'none';
  track.style.transform = `translateX(-${fsCard*100}%)`;
  setTimeout(() => track.style.transition = 'transform 0.28s ease', 10);
  document.getElementById('fs-label').textContent = block.label;
  fsUpdateDots();
}

function fsSlide(dir) {
  fsCard = (fsCard + dir + data[fsBlock].cards.length) % data[fsBlock].cards.length;
  document.getElementById('fs-track').style.transform = `translateX(-${fsCard*100}%)`;
  fsUpdateDots();
}

function fsUpdateDots() {
  document.getElementById('fs-dots').innerHTML =
    data[fsBlock].cards.map((_,i) => `<div class="fs-dot ${i===fsCard?'active':''}"></div>`).join('');
  document.getElementById('fs-prog').textContent = `${fsCard+1}/${data[fsBlock].cards.length}`;
}

// ===== TOUCH SWIPE =====
let tx = 0, ty = 0, touchBi = null;

document.addEventListener('touchstart', e => {
  tx = e.touches[0].clientX;
  ty = e.touches[0].clientY;
  if (!isFullscreen) {
    let el = e.target;
    while (el && !el.classList.contains('block')) el = el.parentElement;
    touchBi = el ? parseInt(el.id.split('-')[1]) : null;
  }
}, { passive: true });

document.addEventListener('touchend', e => {
  const dx = tx - e.changedTouches[0].clientX;
  const dy = e.changedTouches[0].clientY - ty;
  const adx = Math.abs(dx);
  const ady = Math.abs(dy);

  if (isFullscreen) {
    // swipe down = exit
    if (dy > 80 && ady > adx) { exitFullscreen(); return; }
    // swipe left/right = slide card
    if (adx > 40 && adx > ady) { dx > 0 ? fsSlide(1) : fsSlide(-1); }
  } else {
    if (adx > 40 && adx > ady && touchBi !== null) {
      dx > 0 ? pSlide(touchBi, 1) : pSlide(touchBi, -1);
    }
  }
});

// ===== KEYBOARD =====
document.addEventListener('keydown', e => {
  if (isFullscreen) {
    if (e.key === 'ArrowRight') fsSlide(1);
    if (e.key === 'ArrowLeft') fsSlide(-1);
    if (e.key === 'Escape') exitFullscreen();
  }
});

// ===== INIT =====
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});
buildPortrait();
</script>
</body>
</html>
