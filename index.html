<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Polina">
  <meta name="theme-color" content="#111111">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <title>Polina</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; width: 100%;
      background: #111;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: white;
      overflow: hidden;
    }

    /* ===== PORTRAIT FEED ===== */
    #feed {
      height: 100vh; width: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 1rem 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .block { width: 100%; }

    .carousel { width: 100%; overflow: hidden; border-radius: 20px; }

    .carousel-track {
      display: flex;
      transition: transform 0.28s ease;
      will-change: transform;
    }

    .card {
      min-width: 100%;
      border-radius: 20px;
      padding: 1.5rem;
      min-height: 140px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .card-text { font-size: 16px; font-weight: 700; line-height: 1.5; }
    .card-text.heading { font-size: 18px; letter-spacing: 0.02em; }

    .bottom-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 0.5rem;
    }

    .nav-btn {
      background: rgba(255,255,255,0.1);
      border: none; border-radius: 50%;
      width: 34px; height: 34px;
      font-size: 15px; color: white;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .nav-btn:active { background: rgba(255,255,255,0.3); }

    .dots { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; justify-content: center; }
    .dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: all 0.22s; flex-shrink: 0; }
    .dot.active { width: 14px; border-radius: 3px; background: white; }

    .progress { font-size: 10px; color: rgba(255,255,255,0.3); flex-shrink: 0; }

    /* ===== FULLSCREEN LANDSCAPE ===== */
    #fullscreen {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: #111;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #fullscreen.active { display: flex; }

    .fs-carousel {
      width: 100%; height: 100%;
      overflow: hidden;
      position: relative;
    }

    .fs-track {
      display: flex;
      height: 100%;
      transition: transform 0.28s ease;
      will-change: transform;
    }

    .fs-card {
      min-width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem 4rem;
      position: relative;
    }

    .fs-text { font-size: 24px; font-weight: 700; line-height: 1.5; }
    .fs-text.heading { font-size: 28px; }

    .fs-bottom {
      position: absolute;
      bottom: 1rem;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .fs-dots { display: flex; gap: 5px; align-items: center; }
    .fs-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.25); transition: all 0.22s; }
    .fs-dot.active { width: 18px; border-radius: 3px; background: white; }
    .fs-progress { font-size: 11px; color: rgba(255,255,255,0.4); }

    .fs-topics {
      position: absolute;
      top: 0.6rem;
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 0 1rem;
    }

    .fs-topic-btn {
      font-size: 9px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      background: rgba(255,255,255,0.08);
      border: none; border-radius: 20px;
      padding: 3px 9px;
      color: rgba(255,255,255,0.4);
      cursor: pointer; transition: all 0.2s;
    }
    .fs-topic-btn.active { background: rgba(255,255,255,0.2); color: white; }
  </style>
</head>
<body>

<div id="feed"></div>

<div id="fullscreen">
  <div class="fs-topics" id="fs-topics"></div>
  <div class="fs-carousel">
    <div class="fs-track" id="fs-track"></div>
  </div>
</div>

<script>
const data = [
  {
    label: "Tell Me About Yourself",
    cards: [
      { bg: "#FF6B6B", color: "#fff", heading: true, text: "TELL ME ABOUT YOURSELF" },
      { bg: "#FF6B6B", color: "#fff", text: "I'm a communications and operations specialist with 15 years of experience." },
      { bg: "#FF8E53", color: "#fff", text: "My superpower is problem solving — I come into a situation where something isn't working, audit the root cause, and build processes that deliver measurable results." },
      { bg: "#FFCC00", color: "#1a1a1a", text: "At Hearst, Hubert Burda Media and InMyRoom the websites weren't growing — I restructured the editorial workflow and achieved 30–35% traffic growth year on year." },
      { bg: "#4CD964", color: "#fff", text: "At Merck employees weren't opening emails — I put up posters with QR codes and got 10,000 townhall views." },
      { bg: "#5AC8FA", color: "#fff", text: "At Habyt residents were leaving negative reviews — I fixed the communication and operations and reduced negative feedback by 20%." },
      { bg: "#007AFF", color: "#fff", text: "What gives me energy is working with real people and seeing results I can actually measure." },
      { bg: "#5856D6", color: "#fff", text: "That's why this role interests me — because the impact is measurable and the problems are real." }
    ]
  },
  {
    label: "Tell Me About Your Experience",
    cards: [
      { bg: "#FF2D55", color: "#fff", heading: true, text: "TELL ME ABOUT YOUR EXPERIENCE" },
      { bg: "#FF2D55", color: "#fff", text: "My career has three chapters. The first — editorial. I grew from cultural journalist to Editor-in-Chief at Hearst and Hubert Burda Media." },
      { bg: "#FF6B6B", color: "#fff", text: "I grew digital audiences from zero to 3.5 million readers at ELLE Girl and 6 million at InMyRoom — by restructuring content workflows, building editorial teams of up to 15 people, and scaling output without losing quality." },
      { bg: "#FF8E53", color: "#fff", text: "Hundreds of brand partnerships — and end-to-end stakeholder communication across editorial, commercial, creative, and agency teams." },
      { bg: "#FFCC00", color: "#1a1a1a", text: "The second chapter — communications. At Merck KGaA I owned internal communications for 65,000 employees. I learned how to make messages actually land." },
      { bg: "#4CD964", color: "#fff", text: "The third chapter — operations. At Habyt I managed 500+ residential units across Germany. Daily escalations, vendor coordination, SOP development." },
      { bg: "#5AC8FA", color: "#fff", text: "And looking back — it's always been the same story: I find what isn't working, I build a process to fix it, and I measure the result." },
      { bg: "#007AFF", color: "#fff", text: "Along the way I developed the skills Kyriba needs most — executive thought leadership, LinkedIn content strategy, B2B storytelling, and stakeholder governance across global teams." }
    ]
  },
  {
    label: "Strengths & Results",
    cards: [
      { bg: "#5856D6", color: "#fff", heading: true, text: "WHAT ARE YOUR STRENGTHS AND RESULTS?" },
      { bg: "#5856D6", color: "#fff", text: "My strongest skill is taking business objectives and solving them through communication — and delivering measurable results." },
      { bg: "#AF52DE", color: "#fff", text: "I see where communication breaks down and build the mechanics that make it work — directly tied to business goals." },
      { bg: "#FF2D55", color: "#fff", text: "At Merck the symptom was low townhall attendance. The root cause was that employees didn't see the email because they weren't at their desks." },
      { bg: "#FF6B6B", color: "#fff", text: "So I went where they were — the canteen — with posters and QR codes. The result was 10,000 views." },
      { bg: "#FF8E53", color: "#fff", text: "At Habyt the symptom was negative reviews. The root cause was a broken chain between the resident and the teams who could actually solve the problem." },
      { bg: "#FFCC00", color: "#1a1a1a", text: "I became the bridge that never broke — building operational processes that connected residents to solutions." },
      { bg: "#4CD964", color: "#fff", text: "As a result, response time dropped by 35% and negative feedback by 20%. Not bad for someone who just moved to Germany." },
      { bg: "#5AC8FA", color: "#fff", text: "I build the channel strategy and governance framework so the same problem doesn't come back." }
    ]
  },
  {
    label: "What Excites You",
    cards: [
      { bg: "#007AFF", color: "#fff", heading: true, text: "WHAT EXCITES YOU ABOUT THIS ROLE?" },
      { bg: "#007AFF", color: "#fff", text: "Right now I'm completing the McKinsey Forward Programme and looking for a senior role where communication has a direct business impact." },
      { bg: "#5856D6", color: "#fff", text: "I've spent 15 years building content systems, communications frameworks, and operational processes across very different industries." },
      { bg: "#AF52DE", color: "#fff", text: "What I'm most proud of is building community at B2B level — at creative agency Elbe am Rhein and among stakeholders of the European Olympic Academies across 30 countries." },
      { bg: "#FF2D55", color: "#fff", text: "At EOA I built a communications strategy around executive thought leadership that felt human, not corporate." },
      { bg: "#FF8E53", color: "#fff", text: "At PackPart I took the same approach into short executive thought leadership videos — and applied my hands-on skills in AI design and video editing." },
      { bg: "#FFCC00", color: "#1a1a1a", text: "I want to bring these skills to a company at Kyriba's level — and feed my passion for finance and grow in the world of financial instruments." }
    ]
  },
  {
    label: "Why Kyriba",
    cards: [
      { bg: "#4CD964", color: "#fff", heading: true, text: "WHY KYRIBA?" },
      { bg: "#4CD964", color: "#fff", text: "Three reasons. First — the audience. Financial Officers care about three things every single day: control, visibility, and risk." },
      { bg: "#5AC8FA", color: "#fff", text: "Not as abstract concepts — as real daily pressure. My job at Kyriba is to translate complex treasury solutions into content that speaks directly to that pressure." },
      { bg: "#007AFF", color: "#fff", text: "Second — the scale. 3,000 customers, 15 trillion dollars in payments, 30+ markets. Building a LinkedIn thought leadership programme at this scale is a different kind of problem than I've solved before. I want that challenge." },
      { bg: "#5856D6", color: "#fff", text: "Third — the mechanics. Kyriba connects, protects, forecasts and optimises. Every one of those four words is a story." },
      { bg: "#AF52DE", color: "#fff", text: "My job is to find the human version — the CFO who saved 8 hours a week, the treasury team that caught a fraud attempt at 2am, the company that survived a currency crisis because they had visibility." },
      { bg: "#FF2D55", color: "#fff", text: "Those stories exist. I want to find them and tell them." }
    ]
  }
];

// State
const pState = data.map(() => 0);
let activeBlock = 0;
let fsBlock = 0;
let fsCard = 0;

// ===== PORTRAIT =====
function buildPortrait() {
  const feed = document.getElementById('feed');
  data.forEach((block, bi) => {
    const el = document.createElement('div');
    el.className = 'block';
    el.id = `block-${bi}`;
    el.innerHTML = `
      <div class="carousel">
        <div class="carousel-track" id="track-${bi}">
          ${block.cards.map(c =>
            `<div class="card" style="background:${c.bg};color:${c.color}">
              <div class="card-text${c.heading?' heading':''}">${c.text}</div>
            </div>`).join('')}
        </div>
      </div>
      <div class="bottom-row">
        <button class="nav-btn" onclick="pSlide(${bi},-1)">←</button>
        <div class="dots" id="pdots-${bi}"></div>
        <span class="progress" id="pprog-${bi}"></span>
        <button class="nav-btn" onclick="pSlide(${bi},1)">→</button>
      </div>`;
    feed.appendChild(el);
    pUpdateDots(bi);
  });
}

function pSlide(bi, dir) {
  activeBlock = bi;
  pState[bi] = (pState[bi] + dir + data[bi].cards.length) % data[bi].cards.length;
  document.getElementById(`track-${bi}`).style.transform = `translateX(-${pState[bi]*100}%)`;
  pUpdateDots(bi);
}

function pUpdateDots(bi) {
  document.getElementById(`pdots-${bi}`).innerHTML =
    data[bi].cards.map((_,i) => `<div class="dot ${i===pState[bi]?'active':''}"></div>`).join('');
  document.getElementById(`pprog-${bi}`).textContent = `${pState[bi]+1}/${data[bi].cards.length}`;
}

// Detect which block is in viewport center
function getVisibleBlock() {
  const feed = document.getElementById('feed');
  const blocks = document.querySelectorAll('.block');
  const feedCenter = feed.scrollTop + feed.clientHeight / 2;
  let closest = 0;
  let minDist = Infinity;
  blocks.forEach((b, i) => {
    const bCenter = b.offsetTop + b.offsetHeight / 2;
    const dist = Math.abs(feedCenter - bCenter);
    if (dist < minDist) { minDist = dist; closest = i; }
  });
  return closest;
}

// ===== FULLSCREEN =====
function buildFsTopics() {
  document.getElementById('fs-topics').innerHTML = data.map((b,bi) =>
    `<button class="fs-topic-btn ${bi===0?'active':''}" onclick="fsGoBlock(${bi})">${b.label}</button>`
  ).join('');
}

function renderFsCards() {
  const track = document.getElementById('fs-track');
  track.innerHTML = data[fsBlock].cards.map(c =>
    `<div class="fs-card" style="background:${c.bg};color:${c.color}">
      <div class="fs-text${c.heading?' heading':''}">${c.text}</div>
      <div class="fs-bottom">
        <button class="nav-btn" onclick="fsSlide(-1)">←</button>
        <div class="fs-dots" id="fs-dots"></div>
        <span class="fs-progress" id="fs-prog"></span>
        <button class="nav-btn" onclick="fsSlide(1)">→</button>
      </div>
    </div>`).join('');
  fsUpdateDots();
  track.style.transform = `translateX(-${fsCard*100}%)`;
}

function fsSlide(dir) {
  fsCard = (fsCard + dir + data[fsBlock].cards.length) % data[fsBlock].cards.length;
  document.getElementById('fs-track').style.transform = `translateX(-${fsCard*100}%)`;
  fsUpdateDots();
}

function fsGoBlock(bi) {
  fsBlock = bi; fsCard = pState[bi];
  document.querySelectorAll('.fs-topic-btn').forEach((b,i) => b.classList.toggle('active', i===bi));
  renderFsCards();
}

function fsUpdateDots() {
  const dots = document.getElementById('fs-dots');
  const prog = document.getElementById('fs-prog');
  if (!dots || !prog) return;
  dots.innerHTML = data[fsBlock].cards.map((_,i) =>
    `<div class="fs-dot ${i===fsCard?'active':''}"></div>`).join('');
  prog.textContent = `${fsCard+1}/${data[fsBlock].cards.length}`;
}

// ===== ORIENTATION =====
function isLandscape() {
  return window.innerWidth > window.innerHeight;
}

function handleOrientation() {
  const fs = document.getElementById('fullscreen');
  const feed = document.getElementById('feed');

  if (isLandscape()) {
    // Use the block that was active/visible in portrait
    const visible = getVisibleBlock();
    fsBlock = visible;
    fsCard = pState[visible];
    document.querySelectorAll('.fs-topic-btn').forEach((b,i) => b.classList.toggle('active', i===fsBlock));
    renderFsCards();
    fs.classList.add('active');
    feed.style.display = 'none';
  } else {
    fs.classList.remove('active');
    feed.style.display = 'flex';
    // Sync portrait card position from fullscreen
    pState[fsBlock] = fsCard;
    document.getElementById(`track-${fsBlock}`).style.transform = `translateX(-${fsCard*100}%)`;
    pUpdateDots(fsBlock);
    // Scroll feed to active block
    setTimeout(() => {
      const blockEl = document.getElementById(`block-${fsBlock}`);
      if (blockEl) blockEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 100);
  }
}

// ===== TOUCH SWIPE =====
let tx = 0, ty = 0, touchBlock = null;

document.addEventListener('touchstart', e => {
  tx = e.touches[0].clientX;
  ty = e.touches[0].clientY;
  if (isLandscape()) return;
  let el = e.target;
  while (el && !el.classList.contains('block')) el = el.parentElement;
  touchBlock = el ? parseInt(el.id.split('-')[1]) : null;
}, { passive: true });

document.addEventListener('touchend', e => {
  const dx = tx - e.changedTouches[0].clientX;
  const dy = Math.abs(ty - e.changedTouches[0].clientY);
  if (Math.abs(dx) > 40 && dy < 80) {
    if (isLandscape()) {
      dx > 0 ? fsSlide(1) : fsSlide(-1);
    } else if (touchBlock !== null) {
      dx > 0 ? pSlide(touchBlock, 1) : pSlide(touchBlock, -1);
    }
  }
});

// ===== KEYBOARD =====
document.addEventListener('keydown', e => {
  if (isLandscape()) {
    if (e.key === 'ArrowRight') fsSlide(1);
    if (e.key === 'ArrowLeft') fsSlide(-1);
  } else {
    const bi = getVisibleBlock();
    if (e.key === 'ArrowRight') pSlide(bi, 1);
    if (e.key === 'ArrowLeft') pSlide(bi, -1);
  }
});

window.addEventListener('resize', handleOrientation);

if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});

buildPortrait();
buildFsTopics();
if (isLandscape()) handleOrientation();
</script>
</body>
</html>
